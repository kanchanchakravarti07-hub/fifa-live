<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.3/shaka-player.compiled.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { background: #000; margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, Helvetica, sans-serif; }
#video-wrapper { position: relative; width: 100vw; height: 100vh; cursor: default; }
video { width: 100%; height: 100%; object-fit: contain; background: #000; }

/* AD GATE OVERLAY */
#ad-gate {
position: absolute; inset: 0; background: #000;
display: flex; align-items: center; justify-content: center;
z-index: 50; cursor: pointer;
}
#ad-gate-btn {
width: 90px; height: 90px; border-radius: 50%;
background: rgba(255,255,255,0.95);
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 0 8px rgba(255,255,255,0.08);
}
#ad-gate-btn svg { width: 34px; height: 34px; margin-left: 4px; }

/* Center big play/pause button */
#center-btn {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
width: 80px; height: 80px; border-radius: 50%;
background: rgba(255,255,255,0.92);
display: flex; align-items: center; justify-content: center;
cursor: pointer; opacity: 0; pointer-events: none;
transition: opacity 0.25s ease;
}
#center-btn.show { opacity: 1; pointer-events: auto; }
#center-btn svg { width: 32px; height: 32px; }

/* Bottom controls bar */
#controls {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 30px 16px 12px 16px;
background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
opacity: 0; transition: opacity 0.25s ease;
pointer-events: none;
}
#controls.show { opacity: 1; pointer-events: auto; }

.progress-row { position: relative; height: 14px; display: flex; align-items: center; margin-bottom: 6px; }
#progress-track {
position: relative; width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;
}
#progress-fill {
position: absolute; left: 0; top: 0; height: 100%; background: #e50914; border-radius: 2px; width: 100%;
}
#live-dot {
position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
width: 10px; height: 10px; border-radius: 50%; background: #e50914;
box-shadow: 0 0 0 3px rgba(229,9,20,0.25);
}

.controls-row { display: flex; align-items: center; justify-content: space-between; color: #fff; }
.controls-left, .controls-right { display: flex; align-items: center; gap: 14px; }
.icon-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; touch-action: manipulation; }
.icon-btn svg { width: 20px; height: 20px; }

.live-label {
display: flex; align-items: center; gap: 6px;
font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #fff;
}
.live-label .dot {
width: 8px; height: 8px; border-radius: 50%; background: #e50914;
}

@media (max-width: 600px) {
#center-btn { width: 64px; height: 64px; }
#center-btn svg { width: 26px; height: 26px; }
#ad-gate-btn { width: 72px; height: 72px; }
.live-label { font-size: 11px; }
}
</style>
</head>
<body>
<div id="video-wrapper">
<video id="video" playsinline></video>

<!-- AD GATE: shown first, video doesn't start till user taps -->
<div id="ad-gate">
<div id="ad-gate-btn">
<svg viewBox="0 0 24 24" fill="#000"><polygon points="6,4 20,12 6,20"/></svg>
</div>
</div>

<div id="center-btn">
<svg id="center-icon" viewBox="0 0 24 24" fill="#000"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
</div>

<div id="controls">
<div class="progress-row">
<div id="progress-track">
<div id="progress-fill"></div>
</div>
<div id="live-dot"></div>
</div>
<div class="controls-row">
<div class="controls-left">
<button class="icon-btn" id="play-btn" onclick="togglePlay()">
<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
</button>
<button class="icon-btn" id="mute-btn" onclick="toggleMute()">
<svg id="mute-icon" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="#fff" stroke-width="1.6" fill="none"/><path d="M19 6a8 8 0 0 1 0 12" stroke="#fff" stroke-width="1.6" fill="none"/></svg>
</button>
</div>
<div class="controls-right">
<div class="live-label"><span class="dot"></span>LIVE</div>
<button class="icon-btn" onclick="goFullscreen()">
<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
</button>
</div>
</div>
</div>
</div>
<script>
const video = document.getElementById('video');
const player = new shaka.Player(video);
const manifestUri = 'https://otte-qw.live.pv-cdn.net/gru-nitro/live/clients/dash/enc/3gg2jnixjn/out/v1/e1840e01f3f14563b66bbb944d5cc54c/cenc.mpd';

player.configure({
drm: { clearKeys: { 'f8b207c10f3f76aeba32a360ec52b9e4': 'afad49d20eb39670e93e371c1d669921' } },
streaming: { liveSyncLeadTime: 0.5 }
});

// ===== AD SMART LINK — replace with your own Adsterra smart link =====
const AD_SMARTLINK = "https://your-adsterra-smartlink-url.com";

const adGate = document.getElementById('ad-gate');
let videoLoaded = false;

adGate.addEventListener('click', async () => {
// open ad in new tab
window.open(AD_SMARTLINK, '_blank');

// hide gate, start stream
adGate.style.display = 'none';

if (!videoLoaded) {
videoLoaded = true;
await player.load(manifestUri);
}

// try unmuted autoplay first
video.muted = false;
video.play().then(() => {
updateMuteIcon();
}).catch(() => {
// fallback: browser blocked sound autoplay, mute and retry
video.muted = true;
video.play();
updateMuteIcon();
});

showUI();
});

function toggleMute() {
video.muted = !video.muted;
updateMuteIcon();
}

function updateMuteIcon() {
const icon = document.getElementById('mute-icon');
if (video.muted) {
icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="16" y1="8" x2="22" y2="16" stroke="#fff" stroke-width="2"/><line x1="22" y1="8" x2="16" y2="16" stroke="#fff" stroke-width="2"/>';
} else {
icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="#fff" stroke-width="1.6" fill="none"/><path d="M19 6a8 8 0 0 1 0 12" stroke="#fff" stroke-width="1.6" fill="none"/>';
}
}

function goFullscreen() {
const el = document.getElementById('video-wrapper');
if (!document.fullscreenElement) {
if (el.requestFullscreen) el.requestFullscreen();
else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
} else {
if (document.exitFullscreen) document.exitFullscreen();
else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
}

const centerBtn = document.getElementById('center-btn');
const centerIcon = document.getElementById('center-icon');
const playBtn = document.getElementById('play-btn');
const controls = document.getElementById('controls');
const wrapper = document.getElementById('video-wrapper');

function setPauseIcon(svg) {
svg.innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
}
function setPlayIcon(svg) {
svg.innerHTML = '<polygon points="6,4 20,12 6,20"/>';
}

// jump to live edge (so resuming after pause doesn't play from behind)
function goToLiveEdge() {
try {
if (player.goToLive) {
player.goToLive();
} else {
const seekRange = player.seekRange();
if (seekRange && isFinite(seekRange.end)) {
video.currentTime = seekRange.end;
}
}
} catch (e) {}
}

function togglePlay() {
if (video.paused) {
goToLiveEdge();
video.play();
} else {
video.pause();
}
showUI();
}
centerBtn.addEventListener('click', togglePlay);

video.addEventListener('play', () => {
setPauseIcon(centerIcon);
setPauseIcon(playBtn.querySelector('svg'));
});
video.addEventListener('pause', () => {
setPlayIcon(centerIcon);
setPlayIcon(playBtn.querySelector('svg'));
showUI(true);
});

/* ---- Auto-hide UI logic ---- */
let hideTimer = null;

function showUI(persist) {
centerBtn.classList.add('show');
controls.classList.add('show');
clearTimeout(hideTimer);
if (!persist) {
hideTimer = setTimeout(() => {
if (!video.paused) {
centerBtn.classList.remove('show');
controls.classList.remove('show');
}
}, 2000);
}
}

wrapper.addEventListener('mousemove', () => showUI());
wrapper.addEventListener('click', (e) => {
if (e.target === wrapper || e.target === video) showUI();
});
wrapper.addEventListener('touchstart', () => showUI());
wrapper.addEventListener('mouseleave', () => {
if (!video.paused) {
centerBtn.classList.remove('show');
controls.classList.remove('show');
}
});
</script>
</body>
</html>
