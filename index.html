<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Stream Master Player</title>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { background: #000; margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, Helvetica, sans-serif; }
#video-wrapper { position: relative; width: 100vw; height: 100vh; }
.video-js { width: 100% !important; height: 100% !important; }
/* hide all default video.js UI, we use our own */
.vjs-control-bar, .vjs-big-play-button, .vjs-loading-spinner, .vjs-poster { display: none !important; }

/* AD GATE OVERLAY */
#ad-gate {
position: absolute; inset: 0; background: #000;
display: flex; align-items: center; justify-content: center;
z-index: 50; cursor: pointer;
}
#ad-gate-btn {
width: 90px; height: 90px; border-radius: 50%;
background: rgba(255,255,255,0.95);
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 0 8px rgba(255,255,255,0.08);
}
#ad-gate-btn svg { width: 34px; height: 34px; margin-left: 4px; }

/* Center big play/pause button */
#center-btn {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
width: 80px; height: 80px; border-radius: 50%;
background: rgba(255,255,255,0.92);
display: flex; align-items: center; justify-content: center;
cursor: pointer; opacity: 0; pointer-events: none;
transition: opacity 0.25s ease; z-index: 20;
}
#center-btn.show { opacity: 1; pointer-events: auto; }
#center-btn svg { width: 32px; height: 32px; }

/* Bottom controls bar */
#controls {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 30px 16px 12px 16px;
background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
opacity: 0; transition: opacity 0.25s ease;
pointer-events: none; z-index: 20;
}
#controls.show { opacity: 1; pointer-events: auto; }

.progress-row { position: relative; height: 14px; display: flex; align-items: center; margin-bottom: 6px; }
#progress-track {
position: relative; width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;
}
#progress-fill {
position: absolute; left: 0; top: 0; height: 100%; background: #e50914; border-radius: 2px; width: 100%;
}
#live-dot {
position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
width: 10px; height: 10px; border-radius: 50%; background: #e50914;
box-shadow: 0 0 0 3px rgba(229,9,20,0.25);
}

.controls-row { display: flex; align-items: center; justify-content: space-between; color: #fff; }
.controls-left, .controls-right { display: flex; align-items: center; gap: 14px; }
.icon-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; touch-action: manipulation; }
.icon-btn svg { width: 20px; height: 20px; }

.live-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #fff; }
.live-label .dot { width: 8px; height: 8px; border-radius: 50%; background: #e50914; }

/* Buffering spinner */
#buffer-spinner {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
width: 48px; height: 48px; border-radius: 50%;
border: 4px solid rgba(255,255,255,0.25);
border-top-color: #fff;
display: none; z-index: 15;
animation: spin 0.8s linear infinite;
}
#buffer-spinner.show { display: block; }
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

@media (max-width: 600px) {
#center-btn { width: 64px; height: 64px; }
#center-btn svg { width: 26px; height: 26px; }
#ad-gate-btn { width: 72px; height: 72px; }
.live-label { font-size: 11px; }
}
</style>
</head>
<body>
<div id="video-wrapper">
<video id="my-video" class="video-js" playsinline></video>

<!-- AD GATE: shown first, stream doesn't start till user taps -->
<div id="ad-gate">
<div id="ad-gate-btn">
<svg viewBox="0 0 24 24" fill="#000"><polygon points="6,4 20,12 6,20"/></svg>
</div>
</div>

<div id="buffer-spinner"></div>

<div id="center-btn">
<svg id="center-icon" viewBox="0 0 24 24" fill="#000"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
</div>

<div id="controls">
<div class="progress-row">
<div id="progress-track"><div id="progress-fill"></div></div>
<div id="live-dot"></div>
</div>
<div class="controls-row">
<div class="controls-left">
<button class="icon-btn" id="play-btn" onclick="togglePlay(event)">
<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
</button>
<button class="icon-btn" id="mute-btn" onclick="toggleMute(event)">
<svg id="mute-icon" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="#fff" stroke-width="1.6" fill="none"/><path d="M19 6a8 8 0 0 1 0 12" stroke="#fff" stroke-width="1.6" fill="none"/></svg>
</button>
</div>
<div class="controls-right">
<div class="live-label"><span class="dot"></span>LIVE</div>
<button class="icon-btn" onclick="goFullscreen(event)">
<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
</button>
</div>
</div>
</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
// ===== Player setup with Referer Header Bypass + buffer tuning =====
const player = videojs('my-video', {
controls: false,
autoplay: false,
liveui: false,
html5: {
vhs: {
// keep more video buffered ahead so weak networks stutter less
GOAL_BUFFER_LENGTH: 30,
MAX_GOAL_BUFFER_LENGTH: 60,
BACK_BUFFER_LENGTH: 30,
// allow a bit of back-buffer so small pauses don't force a hard reset
bandwidth: 4194304,
enableLowInitialPlaylist: true,
useDevicePixelRatio: true
},
hls: {
beforeRequest: function(options) {
options.headers = {
...options.headers,
'Referer': 'https://iptv-eldbert.xyz/'
};
return options;
}
}
}
});

// ===== Stream link (AUTO-UPDATED BY GITHUB WORKFLOW - DO NOT EDIT MANUALLY) =====
const streamUrl = "https://c2f2zq.fubo18.com:443/dsports/mono.m3u8?token=372ee608a77bd31b17977021e248b99aae9ab7dd-73-1782037033-1782019033";

// ===== Adsterra smart link =====
const AD_SMARTLINK = "https://www.effectivecpmnetwork.com/iyj82vg6?key=6a0d8977ddd973a097989e53a0e27ce4";

const adGate = document.getElementById('ad-gate');
let streamLoaded = false;

adGate.addEventListener('click', () => {
window.open(AD_SMARTLINK, '_blank');
adGate.style.display = 'none';

if (!streamLoaded) {
streamLoaded = true;
player.src({ src: streamUrl, type: 'application/x-mpegURL' });
}

player.muted(false);
const p = player.play();
if (p && p.catch) {
p.catch(() => {
player.muted(true);
player.play();
updateMuteIcon();
});
}
updateMuteIcon();
showUI();
});

function toggleMute(e) {
if (e) e.stopPropagation();
player.muted(!player.muted());
updateMuteIcon();
}

function updateMuteIcon() {
const icon = document.getElementById('mute-icon');
if (player.muted()) {
icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="16" y1="8" x2="22" y2="16" stroke="#fff" stroke-width="2"/><line x1="22" y1="8" x2="16" y2="16" stroke="#fff" stroke-width="2"/>';
} else {
icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="#fff" stroke-width="1.6" fill="none"/><path d="M19 6a8 8 0 0 1 0 12" stroke="#fff" stroke-width="1.6" fill="none"/>';
}
}

function goFullscreen(e) {
if (e) e.stopPropagation();
const el = document.getElementById('video-wrapper');
if (!document.fullscreenElement) {
if (el.requestFullscreen) el.requestFullscreen();
else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
} else {
if (document.exitFullscreen) document.exitFullscreen();
else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
}

const centerBtn = document.getElementById('center-btn');
const centerIcon = document.getElementById('center-icon');
const playBtn = document.getElementById('play-btn');
const controls = document.getElementById('controls');
const wrapper = document.getElementById('video-wrapper');
const bufferSpinner = document.getElementById('buffer-spinner');

function setPauseIcon(svg) { svg.innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>'; }
function setPlayIcon(svg) { svg.innerHTML = '<polygon points="6,4 20,12 6,20"/>'; }

// Only snap to live edge if user has drifted far behind (e.g. long pause / heavy buffering).
// A short pause/resume just continues from where it was — much smoother, no jump/stutter feeling.
const LIVE_DRIFT_THRESHOLD = 15; // seconds behind live edge before we force a jump

function maybeCatchUpToLive() {
try {
const seekable = player.seekable();
if (seekable && seekable.length) {
const liveEdge = seekable.end(seekable.length - 1);
const current = player.currentTime();
if (liveEdge - current > LIVE_DRIFT_THRESHOLD) {
player.currentTime(liveEdge - 2); // land just slightly behind true edge for stability
}
}
} catch (e) {}
}

function togglePlay(e) {
if (e) e.stopPropagation();
if (player.paused()) {
maybeCatchUpToLive();
player.play();
} else {
player.pause();
}
showUI();
}
centerBtn.addEventListener('click', togglePlay);

player.on('play', () => {
setPauseIcon(centerIcon);
setPauseIcon(playBtn.querySelector('svg'));
});
player.on('pause', () => {
setPlayIcon(centerIcon);
setPlayIcon(playBtn.querySelector('svg'));
showUI(true);
});

// show a spinner while buffering/stalling so it doesn't look "stuck"
player.on('waiting', () => bufferSpinner.classList.add('show'));
player.on('playing', () => bufferSpinner.classList.remove('show'));
player.on('canplay', () => bufferSpinner.classList.remove('show'));

/* ---- Auto-hide UI logic ---- */
let hideTimer = null;
function showUI(persist) {
centerBtn.classList.add('show');
controls.classList.add('show');
clearTimeout(hideTimer);
if (!persist) {
hideTimer = setTimeout(() => {
if (!player.paused()) {
centerBtn.classList.remove('show');
controls.classList.remove('show');
}
}, 2000);
}
}

/* ---- Tap anywhere = play/pause, Double-tap = fullscreen (works on laptop too) ---- */
let lastTapTime = 0;
let singleTapTimer = null;

function handleWrapperTap(e) {
// ignore taps on the controls bar / buttons, they handle themselves
if (e.target.closest('#controls') || e.target.closest('#ad-gate')) return;

const now = Date.now();
const delta = now - lastTapTime;

if (delta > 0 && delta < 350) {
// double tap/click detected
clearTimeout(singleTapTimer);
lastTapTime = 0;
goFullscreen();
} else {
lastTapTime = now;
// wait briefly to see if a second tap comes in before treating as single tap
singleTapTimer = setTimeout(() => {
togglePlay();
}, 300);
}
}

wrapper.addEventListener('click', handleWrapperTap);
wrapper.addEventListener('mousemove', () => showUI());
wrapper.addEventListener('touchstart', () => showUI());
wrapper.addEventListener('mouseleave', () => {
if (!player.paused()) {
centerBtn.classList.remove('show');
controls.classList.remove('show');
}
});
</script>
</body>
</html>
