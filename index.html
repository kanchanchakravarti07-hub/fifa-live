<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Master Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .video-js { width: 100%; height: 100%; }
        #play-btn {
            position: absolute; z-index: 99; padding: 25px 50px; font-size: 22px;
            cursor: pointer; background: #ff0000; color: white; border: none; 
            border-radius: 50px; box-shadow: 0 4px 15px rgba(255,0,0,0.5);
            font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button id="play-btn">Click to Start Stream</button>

    <video id="my-video" class="video-js vjs-big-play-centered" controls playsinline></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // 1. Player setup with Referer Header Bypass
        const player = videojs('my-video', {
            html5: {
                hls: {
                    beforeRequest: function(options) {
                        options.headers = {
                            ...options.headers,
                            'Referer': 'https://iptv-eldbert.xyz/'
                        };
                        return options;
                    }
                }
            }
        });

        // 2. Stream link (TOKEN EXPIRE HOTA HAI, AGAR CHALE NA TO NAYA LINK YAHAN PASTE KARIYO)
        const streamUrl = "https://iptv-eldbert.xyz/proxy?url=https%3A%2F%2Faw1wcm92zq.fubo18.com%3A443%2Fdsports%2Fmono.m3u8%3Ftoken%3D4b0e0a072e2b1f72f87a02aa8ded8d545d4fecbf-ea-1781900206-1781882206";

        const btn = document.getElementById('play-btn');

        btn.addEventListener('click', () => {
            // Adsterra Link
            window.open("https://www.effectivecpmnetwork.com/iyj82vg6?key=6a0d8977ddd973a097989e53a0e27ce4", "_blank");
            
            btn.style.display = 'none';

            // Load and Play
            player.src({ src: streamUrl, type: 'application/x-mpegURL' });
            player.play().catch(e => console.log("Playback error", e));
        });
    </script>
</body>
</html>
