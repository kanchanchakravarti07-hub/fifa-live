<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 25%, #7dd3fc 50%, #38bdf8 75%, #0ea5e9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #0c4a6e;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(186, 230, 253, 0.5) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0369a1, #0284c7, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(14, 165, 233, 0.2);
        }

        .header p {
            color: #0369a1;
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Smart Link Banner */
        .ad-banner {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.15);
            transition: all 0.3s ease;
        }

        .ad-banner:hover {
            box-shadow: 0 12px 40px rgba(14, 165, 233, 0.25);
            transform: translateY(-2px);
        }

        .ad-banner a {
            color: #0284c7;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .ad-banner a::after {
            content: '↗';
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Channel Sidebar */
        .sidebar {
            position: sticky;
            top: 20px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.1);
            position: relative;
            overflow: hidden;
        }

        .channel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #0ea5e9, #0284c7);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .channel-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(14, 165, 233, 0.25);
            background: rgba(255, 255, 255, 0.9);
        }

        .channel-card:hover::before {
            opacity: 1;
        }

        .channel-card.active {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.3);
            border-color: rgba(14, 165, 233, 0.4);
        }

        .channel-card.active::before {
            opacity: 1;
        }

        .channel-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .caze-icon {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }

        .goltv-icon {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
        }

        .channel-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0c4a6e;
            margin-bottom: 4px;
        }

        .channel-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #16a34a;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Player Area */
        .player-section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.15);
        }

        .player-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(14, 165, 233, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .player-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0c4a6e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-title .live-badge {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .player-info-text {
            color: #0369a1;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .quality-badge {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Footer Ad */
        .footer-ad {
            margin-top: 24px;
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .channel-card {
                margin-bottom: 0;
            }

            .header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 12px;
            }
        }

        /* Loading state */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚽ Live Sports Stream</h1>
            <p>HD Quality • Real-time • Zero Buffer</p>
        </div>

        <!-- Smart Link Banner Ad -->
        <div class="ad-banner">
            <a href="https://www.effectivecpmnetwork.com/iyj82vg6?key=6a0d8977ddd973a097989e53a0e27ce4" target="_blank" rel="noopener noreferrer">
                🔥 Special Offer - Click Here to Claim Your Bonus!
            </a>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Channel Sidebar -->
            <div class="sidebar">
                <div class="channel-card active" onclick="switchChannel('caze')" id="card-caze">
                    <div class="channel-icon caze-icon">CZ</div>
                    <div class="channel-name">CazéTV</div>
                    <div class="channel-status">
                        <span class="live-dot"></span>
                        LIVE NOW
                    </div>
                </div>

                <div class="channel-card" onclick="switchChannel('goltv')" id="card-goltv">
                    <div class="channel-icon goltv-icon">GL</div>
                    <div class="channel-name">GolTV VIVO</div>
                    <div class="channel-status">
                        <span class="live-dot"></span>
                        LIVE NOW
                    </div>
                </div>
            </div>

            <!-- Player Section -->
            <div class="player-section">
                <div class="player-header">
                    <div class="player-title">
                        <span id="current-channel-name">CazéTV</span>
                        <span class="live-badge">LIVE</span>
                    </div>
                </div>
                <div class="player-wrapper" id="player-container">
                    <iframe 
                        id="stream-frame"
                        src="https://vileembeds.pages.dev/embed/cazetv-br" 
                        allow="autoplay; fullscreen; encrypted-media"
                        allowfullscreen
                        loading="eager">
                    </iframe>
                </div>
                <div class="player-info">
                    <span class="player-info-text">📡 Streaming in HD • Auto-quality adjustment</span>
                    <span class="quality-badge">1080p</span>
                </div>
            </div>
        </div>

        <!-- Footer Ad Space -->
        <div class="footer-ad">
            <script src="https://pl29801651.effectivecpmnetwork.com/cb/47/e4/cb47e4d5000452f48e94b4cb8da615b8.js"></script>
        </div>
    </div>

    <script>
        const channels = {
            caze: {
                name: 'CazéTV',
                url: 'https://vileembeds.pages.dev/embed/cazetv-br',
                icon: 'CZ',
                color: 'caze-icon'
            },
            goltv: {
                name: 'GolTV VIVO',
                url: 'https://sayanchannelcdn03.pages.dev/football/goltv.html',
                icon: 'GL',
                color: 'goltv-icon'
            }
        };

        let currentChannel = 'caze';

        function switchChannel(channelId) {
            if (channelId === currentChannel) return;

            // Update cards
            document.querySelectorAll('.channel-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById('card-' + channelId).classList.add('active');

            // Update player title
            document.getElementById('current-channel-name').textContent = channels[channelId].name;

            // Swap iframe with fade
            const container = document.getElementById('player-container');
            const oldFrame = document.getElementById('stream-frame');

            oldFrame.style.opacity = '0';
            oldFrame.style.transition = 'opacity 0.3s ease';

            setTimeout(() => {
                oldFrame.src = channels[channelId].url;
                oldFrame.onload = () => {
                    oldFrame.style.opacity = '1';
                };
            }, 300);

            currentChannel = channelId;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') switchChannel('caze');
            if (e.key === '2') switchChannel('goltv');
        });
    </script>
</body>
</html>
