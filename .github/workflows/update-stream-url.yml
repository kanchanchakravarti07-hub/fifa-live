- name: Capture Real DSports URL
        id: capture
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          
          (async () => {
            console.log('🚀 HUMAN-STYLE AUTOMATION\n');
            
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security', '--disable-features=IsolateOrigins,site-per-process']
            });
            const page = await browser.newPage();
            
            let realUrl = null;
            
            page.on('response', (response) => {
              const url = response.url();
              if (url.includes('/proxy?')) {
                try {
                  const urlObj = new URL(url);
                  const encoded = urlObj.searchParams.get('url');
                  if (encoded) {
                    realUrl = decodeURIComponent(encoded);
                    console.log('\n✅ CAPTURED: ' + realUrl);
                  }
                } catch (e) {}
              }
            });
            
            try {
              console.log('1️⃣ Loading website...');
              await page.goto('https://iptv-eldbert.xyz/iptv/', { waitUntil: 'networkidle2', timeout: 40000 });
              
              console.log('⏳ Waiting 15 seconds...');
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              console.log('2️⃣ Scrolling down to FIFA...');
              await page.evaluate(() => window.scrollBy(0, 500));
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              console.log('3️⃣ Clicking FIFA World Cup...');
              await page.evaluate(() => {
                const buttons = Array.from(document.querySelectorAll('button'));
                const fifaBtn = buttons.find(b => b.textContent.includes('FIFA World Cup'));
                if (fifaBtn) {
                  fifaBtn.scrollIntoView({ behavior: 'smooth' });
                  fifaBtn.click();
                }
              });
              
              console.log('✅ FIFA clicked!');
              
              console.log('⏳ Waiting 8 seconds for FIFA channels...');
              await new Promise(resolve => setTimeout(resolve, 8000));
              
              console.log('4️⃣ Scrolling down to find DSports...');
              await page.evaluate(() => window.scrollBy(0, 500));
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              console.log('5️⃣ Looking for DSports...');
              
              console.log('6️⃣ Clicking DSports...');
              const dsportsClicked = await page.evaluate(() => {
                const elements = Array.from(document.querySelectorAll('*'));
                for (let el of elements) {
                  const text = el.textContent;
                  if (text.includes('⚽ DSports') && !text.includes('Plus') && text.length < 30 && el.offsetParent !== null) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    el.click();
                    return true;
                  }
                }
                return false;
              });
              
              console.log(dsportsClicked ? '✅ DSports clicked!' : '❌ DSports click failed');
              
              console.log('\n▶️ STREAM LOADING...');
              console.log('⏳ Waiting 25 seconds for proxy URL...\n');
              
              await new Promise(resolve => setTimeout(resolve, 25000));
              
              if (realUrl) {
                console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                console.log('✅✅✅ REAL DSPORTS URL ✅✅✅');
                console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                console.log(realUrl);
                console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');
                
                const fs = require('fs');
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `stream_url=${realUrl}\n`);
              } else {
                throw new Error('No URL captured after 25 seconds');
              }
              
            } catch (err) {
              console.error('\n❌ Error: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
