name: DSports Real URL Capture & Update
 
permissions:
  contents: write
 
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
 
jobs:
  capture-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
 
      - name: Install Puppeteer & Dependencies
        run: npm install puppeteer
 
      - name: Capture Real DSports URL
        id: capture
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          
          (async () => {
            console.log('🚀 HUMAN-STYLE AUTOMATION\n');
            
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security']
            });
            const page = await browser.newPage();
            
            let realUrl = null;
            
            page.on('response', (response) => {
              const url = response.url();
              if (url.includes('/proxy?')) {
                try {
                  const urlObj = new URL(url);
                  const encoded = urlObj.searchParams.get('url');
                  if (encoded) {
                    realUrl = decodeURIComponent(encoded);
                    console.log('\n✅ CAPTURED: ' + realUrl);
                  }
                } catch (e) {}
              }
            });
            
            try {
              console.log('1️⃣ Loading website...');
              await page.goto('https://iptv-eldbert.xyz/iptv/', { waitUntil: 'networkidle2', timeout: 40000 });
              
              console.log('⏳ Waiting 15 seconds...');
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              console.log('2️⃣ Scrolling down...');
              await page.evaluate(() => {
                window.scrollBy(0, 500);
              });
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              console.log('3️⃣ Clicking FIFA World Cup...');
              await page.evaluate(() => {
                const buttons = Array.from(document.querySelectorAll('button'));
                const fifaBtn = buttons.find(b => b.textContent.includes('FIFA World Cup'));
                if (fifaBtn) {
                  fifaBtn.scrollIntoView({ behavior: 'smooth' });
                  fifaBtn.click();
                }
              });
              
              console.log('✅ FIFA clicked!');
              
              console.log('⏳ Waiting 15 seconds for FIFA channels to load...');
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              console.log('🔍 Scrolling down to find DSports...');
              for (let i = 0; i < 5; i++) {
                await page.evaluate(() => {
                  window.scrollBy(0, 300);
                });
                await new Promise(resolve => setTimeout(resolve, 1500));
              }
              
              console.log('4️⃣ Looking for DSports with flexible detection...');
              
              console.log('5️⃣ Clicking DSports...');
              let dsportsClicked = false;
              
              for (let attempt = 0; attempt < 5; attempt++) {
                dsportsClicked = await page.evaluate(() => {
                  const allElements = Array.from(document.querySelectorAll('*'));
                  
                  for (let el of allElements) {
                    const text = el.textContent;
                    const trimmed = text ? text.trim() : '';
                    
                    const hasDSports = (
                      trimmed.includes('DSports') ||
                      trimmed.includes('dsports') ||
                      trimmed.includes('Dsports') ||
                      text.includes('⚽ DSports') ||
                      (text.includes('D') && text.includes('Sports'))
                    );
                    
                    const notPlus = !trimmed.includes('Plus') && !text.includes('Plus');
                    const isVisible = el.offsetParent !== null;
                    const isSmallEnough = trimmed.length < 100;
                    
                    if (hasDSports && notPlus && isVisible && isSmallEnough) {
                      try {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.click();
                        return true;
                      } catch (e) {
                        console.log('Click error:', e.message);
                      }
                    }
                  }
                  return false;
                });
                
                if (dsportsClicked) {
                  console.log('✅ DSports clicked on attempt ' + (attempt + 1));
                  break;
                }
                
                console.log('❌ Attempt ' + (attempt + 1) + ' failed, scrolling more...');
                await page.evaluate(() => {
                  window.scrollBy(0, 250);
                });
                await new Promise(resolve => setTimeout(resolve, 2000));
              }
              
              if (!dsportsClicked) {
                throw new Error('DSports click failed after 5 attempts');
              }
              
              console.log('\n▶️ STREAM LOADING...');
              console.log('⏳ Waiting 35 seconds for proxy URL...\n');
              
              await new Promise(resolve => setTimeout(resolve, 35000));
              
              if (realUrl) {
                console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                console.log('✅✅✅ REAL DSPORTS URL ✅✅✅');
                console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                console.log(realUrl);
                console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');
                
                const fs = require('fs');
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `stream_url=${realUrl}\n`);
              } else {
                throw new Error('No URL captured after 35 seconds');
              }
              
            } catch (err) {
              console.error('\n❌ Error: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
 
      - name: Update index.html
        if: success()
        run: |
          CAPTURED_URL="${{ steps.capture.outputs.stream_url }}"
          CURRENT_URL=$(grep -o 'const streamUrl = "[^"]*"' index.html | cut -d'"' -f2 || echo "EMPTY")
          
          echo "Current URL: $CURRENT_URL"
          echo "Captured URL: $CAPTURED_URL"
          
          if [ "$CURRENT_URL" != "$CAPTURED_URL" ] && [ ! -z "$CAPTURED_URL" ]; then
            echo "🔄 URL changed - updating"
            sed -i "s|const streamUrl = \".*\"|const streamUrl = \"$CAPTURED_URL\"|g" index.html
            echo "URL_UPDATED=true" >> $GITHUB_ENV
          else
            echo "✅ URL same - no update"
            echo "URL_UPDATED=false" >> $GITHUB_ENV
          fi
 
      - name: Commit and push
        if: env.URL_UPDATED == 'true'
        run: |
          git config --local user.email "axiom-bot@github.com"
          git config --local user.name "Axiom Real URL Automator"
          git add index.html
          git commit -m "🔄 Real DSports URL updated [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
 
