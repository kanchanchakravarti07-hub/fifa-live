name: Stream Auto-Update

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  auto-update-stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Capture Real DSports URL
        id: capture
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            let realUrl = null;
            
            page.on('response', (response) => {
              const url = response.url();
              if (url.includes('/proxy?')) {
                try {
                  const urlObj = new URL(url);
                  const encoded = urlObj.searchParams.get('url');
                  if (encoded) {
                    realUrl = decodeURIComponent(encoded);
                  }
                } catch (e) {}
              }
            });
            
            try {
              console.log('Loading IPTV...');
              await page.goto('https://iptv-eldbert.xyz/iptv/', { waitUntil: 'networkidle2', timeout: 40000 });
              
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              await page.evaluate(() => window.scrollBy(0, 500));
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              await page.evaluate(() => {
                const buttons = Array.from(document.querySelectorAll('button'));
                const fifaBtn = buttons.find(b => b.textContent.includes('FIFA World Cup'));
                if (fifaBtn) {
                  fifaBtn.scrollIntoView({ behavior: 'smooth' });
                  fifaBtn.click();
                }
              });
              
              await new Promise(resolve => setTimeout(resolve, 12000));
              
              await page.evaluate(() => window.scrollBy(0, 400));
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              let clicked = false;
              for (let i = 0; i < 3; i++) {
                clicked = await page.evaluate(() => {
                  const elements = Array.from(document.querySelectorAll('*'));
                  for (let el of elements) {
                    const text = el.textContent;
                    if (text.includes('⚽ DSports') && !text.includes('Plus') && text.length < 30 && el.offsetParent !== null) {
                      el.scrollIntoView({ behavior: 'smooth' });
                      el.click();
                      return true;
                    }
                  }
                  return false;
                });
                if (clicked) break;
                await page.evaluate(() => window.scrollBy(0, 300));
                await new Promise(resolve => setTimeout(resolve, 2000));
              }
              
              await new Promise(resolve => setTimeout(resolve, 25000));
              
              if (realUrl) {
                console.log('CAPTURED_URL=' + realUrl);
                const fs = require('fs');
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `stream_url=${realUrl}\n`);
              } else {
                throw new Error('No URL captured');
              }
              
            } catch (err) {
              console.error('Error: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Compare and Update
        if: success()
        run: |
          CAPTURED_URL="${{ steps.capture.outputs.stream_url }}"
          CURRENT_URL=$(grep -o 'const streamUrl = "[^"]*"' index.html | cut -d'"' -f2 || echo "EMPTY")
          
          echo "Current: $CURRENT_URL"
          echo "Captured: $CAPTURED_URL"
          
          if [ "$CURRENT_URL" != "$CAPTURED_URL" ] && [ ! -z "$CAPTURED_URL" ]; then
            echo "URL changed - updating"
            sed -i "s|const streamUrl = \".*\"|const streamUrl = \"$CAPTURED_URL\"|g" index.html
            echo "UPDATED=true" >> $GITHUB_ENV
          else
            echo "URL same - no update"
            echo "UPDATED=false" >> $GITHUB_ENV
          fi

      - name: Commit and Push
        if: env.UPDATED == 'true'
        run: |
          git config --local user.email "axiom-bot@github.com"
          git config --local user.name "Axiom Auto-Update"
          git add index.html
          git commit -m "🔄 Stream URL updated [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
