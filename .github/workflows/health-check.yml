- name: Capture Real DSports URL
        id: capture
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          
          (async () => {
            console.log('рџљЂ HUMAN-STYLE AUTOMATION\n');
            
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security']
            });
            const page = await browser.newPage();
            
            let realUrl = null;
            
            page.on('response', (response) => {
              const url = response.url();
              if (url.includes('/proxy?')) {
                try {
                  const urlObj = new URL(url);
                  const encoded = urlObj.searchParams.get('url');
                  if (encoded) {
                    realUrl = decodeURIComponent(encoded);
                    console.log('\nвњ… CAPTURED: ' + realUrl);
                  }
                } catch (e) {}
              }
            });
            
            try {
              console.log('1пёЏвѓЈ Loading website...');
              await page.goto('https://iptv-eldbert.xyz/iptv/', { waitUntil: 'networkidle2', timeout: 40000 });
              
              console.log('вЏі Waiting 15 seconds...');
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              console.log('2пёЏвѓЈ Scrolling down...');
              await page.evaluate(() => {
                window.scrollBy(0, 500);
              });
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              console.log('3пёЏвѓЈ Clicking FIFA World Cup...');
              await page.evaluate(() => {
                const buttons = Array.from(document.querySelectorAll('button'));
                const fifaBtn = buttons.find(b => b.textContent.includes('FIFA World Cup'));
                if (fifaBtn) {
                  fifaBtn.scrollIntoView({ behavior: 'smooth' });
                  fifaBtn.click();
                }
              });
              
              console.log('вњ… FIFA clicked!');
              
              console.log('вЏі Waiting 15 seconds for FIFA channels to load...');
              await new Promise(resolve => setTimeout(resolve, 15000));
              
              console.log('рџ”Ќ Scrolling down to find DSports...');
              for (let i = 0; i < 4; i++) {
                await page.evaluate(() => {
                  window.scrollBy(0, 300);
                });
                await new Promise(resolve => setTimeout(resolve, 1500));
              }
              
              console.log('4пёЏвѓЈ Looking for DSports...');
              
              console.log('5пёЏвѓЈ Clicking DSports with smart detection...');
              let dsportsClicked = false;
              
              for (let attempt = 0; attempt < 5; attempt++) {
                dsportsClicked = await page.evaluate(() => {
                  const allElements = Array.from(document.querySelectorAll('*'));
                  
                  for (let el of allElements) {
                    const text = el.textContent;
                    
                    if (text && text.includes('DSports') && !text.includes('Plus')) {
                      const trimmed = text.trim();
                      if (trimmed.length < 50 && el.offsetParent !== null) {
                        try {
                          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                          el.click();
                          return true;
                        } catch (e) {}
                      }
                    }
                  }
                  return false;
                });
                
                if (dsportsClicked) {
                  console.log('вњ… DSports clicked on attempt ' + (attempt + 1));
                  break;
                }
                
                console.log('вќЊ Attempt ' + (attempt + 1) + ' failed, scrolling more...');
                await page.evaluate(() => {
                  window.scrollBy(0, 250);
                });
                await new Promise(resolve => setTimeout(resolve, 2000));
              }
              
              if (!dsportsClicked) {
                throw new Error('DSports click failed after 5 attempts - element not found');
              }
              
              console.log('\nв–¶пёЏ STREAM LOADING...');
              console.log('вЏі Waiting 35 seconds for proxy URL...\n');
              
              await new Promise(resolve => setTimeout(resolve, 35000));
              
              if (realUrl) {
                console.log('\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ');
                console.log('вњ…вњ…вњ… REAL DSPORTS URL вњ…вњ…вњ…');
                console.log('в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ');
                console.log(realUrl);
                console.log('в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n');
                
                const fs = require('fs');
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `stream_url=${realUrl}\n`);
              } else {
                throw new Error('No URL captured after 35 seconds');
              }
              
            } catch (err) {
              console.error('\nвќЊ Error: ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
