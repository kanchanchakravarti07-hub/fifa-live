name: Stream Auto-Update

permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  auto-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Capture & Update
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          
          (async () => {
            console.log('🚀 Stream Auto-Update\n');
            
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            
            let realUrl = null;
            
            page.on('response', (response) => {
              const url = response.url();
              if (url.includes('/proxy?')) {
                try {
                  const urlObj = new URL(url);
                  const encoded = urlObj.searchParams.get('url');
                  if (encoded) {
                    realUrl = decodeURIComponent(encoded);
                    console.log('✅ CAPTURED');
                  }
                } catch (e) {}
              }
            });
            
            try {
              console.log('1️⃣ Loading...');
              await page.goto('https://iptv-eldbert.xyz/iptv/', { waitUntil: 'networkidle2', timeout: 40000 });
              await new Promise(r => setTimeout(r, 8000));
              
              console.log('2️⃣ Scroll & Click FIFA...');
              for (let i = 0; i < 3; i++) {
                await page.evaluate(() => window.scrollBy(0, 300));
                await new Promise(r => setTimeout(r, 600));
              }
              
              await page.evaluate(() => {
                Array.from(document.querySelectorAll('button')).find(b => b.textContent.includes('FIFA') && b.textContent.includes('World Cup'))?.click();
              });
              
              await new Promise(r => setTimeout(r, 7000));
              
              console.log('3️⃣ Scroll & Click DSports...');
              for (let i = 0; i < 8; i++) {
                await page.evaluate(() => window.scrollBy(0, 350));
                await new Promise(r => setTimeout(r, 700));
              }
              
              await page.evaluate(() => {
                Array.from(document.querySelectorAll('*')).find(e => e.textContent.trim() === '⚽ DSports' && e.offsetParent)?.click();
              });
              
              console.log('▶️ Waiting 45 seconds for stream...');
              await new Promise(r => setTimeout(r, 45000));
              
              if (!realUrl) throw new Error('No URL captured');
              
              console.log('\n✅ URL: ' + realUrl.substring(0, 80) + '...\n');
              
              const html = fs.readFileSync('index.html', 'utf8');
              const current = html.match(/const streamUrl = "([^"]+)"/)?.[1];
              
              if (current === realUrl) {
                console.log('✅ URLs match');
                process.exit(0);
              }
              
              console.log('🔄 Updating...');
              const updated = html.replace(/const streamUrl = "[^"]*"/, `const streamUrl = "${realUrl}"`);
              fs.writeFileSync('index.html', updated);
              console.log('✅ Updated');
              process.exit(0);
              
            } catch (err) {
              console.error('❌ ' + err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Commit & Push
        run: |
          if git diff --quiet index.html; then
            echo "✅ No changes"
          else
            git config user.email "axiom-bot@github.com"
            git config user.name "Axiom"
            git add index.html
            git commit -m "🔄 URL Updated $(date +'%H:%M')"
            git push origin main || git push origin master
          fi
