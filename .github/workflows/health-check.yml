name: Health Check Monitor (Triggers Capture If Down)

permissions:
  contents: read
  actions: write

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check If Stream URL Is Active
        id: check
        continue-on-error: true
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          
          const indexContent = fs.readFileSync('index.html', 'utf8');
          const streamMatch = indexContent.match(/const streamUrl = "([^"]+)"/);
          
          if (!streamMatch) {
            console.log('❌ No stream URL found in index.html');
            process.exit(1);
          }
          
          const streamUrl = streamMatch[1];
          console.log('🔍 Checking if streamUrl is active...');
          console.log('URL: ' + streamUrl.substring(0, 80) + '...\n');
          
          https.get(streamUrl, { timeout: 10000 }, (res) => {
            if (res.statusCode >= 200 && res.statusCode < 400) {
              console.log('✅ Stream is ACTIVE - Status: ' + res.statusCode);
              console.log('No action needed\n');
              process.exit(0);
            } else {
              console.log('❌ Stream returned bad status: ' + res.statusCode);
              process.exit(1);
            }
          }).on('error', (err) => {
            console.log('❌ Stream is DOWN - Error: ' + err.message);
            process.exit(1);
          });
          EOF

      - name: Trigger Capture Workflow
        if: failure()
        run: |
          echo "🚨 Stream is DOWN - Triggering capture workflow..."
          curl -X POST https://api.github.com/repos/${{ github.repository }}/actions/workflows/dsports-capture.yml/dispatches \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"main"}' \
            -w "\nResponse Status: %{http_code}\n"
          echo "✅ Capture workflow trigger sent!"
