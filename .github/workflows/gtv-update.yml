name: GTV URL & Keys Capture

permissions:
  contents: write

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-gtv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and Extract Data
        id: extract
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          // We fetch the main page (the Doc)
          const options = {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' }
          };

          https.get('https://sayanchannelcdn03.pages.dev/football/goltv', options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              // Extracting using the exact patterns from your screenshot
              const urlMatch = data.match(/const STREAM_URL\s*=\s*['"]([^'"]+)['"]/);
              const keyMatch = data.match(/RAW_KEYS\s*=\s*['"]([^'"]+)['"]/);

              if (urlMatch && keyMatch) {
                console.log(`STREAM_URL=${urlMatch[1]}`);
                console.log(`RAW_KEYS=${keyMatch[1]}`);
                
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `STREAM_URL=${urlMatch[1]}\n`);
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `RAW_KEYS=${keyMatch[1]}\n`);
              } else {
                console.error('❌ Could not find variables in the Doc response!');
                process.exit(1);
              }
            });
          }).on('error', (e) => {
            console.error(e);
            process.exit(1);
          });
          EOF
      - name: Update gtv.html
        run: |
          NEW_URL="${{ steps.extract.outputs.STREAM_URL }}"
          NEW_KEYS="${{ steps.extract.outputs.RAW_KEYS }}"
          
          # Update the file using sed
          if [ ! -z "$NEW_URL" ] && [ ! -z "$NEW_KEYS" ]; then
            sed -i "s|const STREAM_URL = \".*\"|const STREAM_URL = \"$NEW_URL\"|g" gtv.html
            sed -i "s|RAW_KEYS = \".*\"|RAW_KEYS = \"$NEW_KEYS\"|g" gtv.html
            echo "URL_UPDATED=true" >> $GITHUB_ENV
          else
            echo "❌ Failed to capture data"
            exit 1
          fi

      - name: Commit and push
        if: env.URL_UPDATED == 'true'
        run: |
          git config --local user.email "axiom-bot@github.com"
          git config --local user.name "Axiom API Automator"
          git add gtv.html
          git commit -m "🔄 GTV Updated via Source Scrape [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
